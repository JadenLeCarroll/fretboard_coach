<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fretboard Coach - Web Prototype</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: monospace; 
        }
        /* Hide the raw video feed, we only want to see our canvas */
        #video { 
            display: none; 
        } 
        /* Flip the canvas horizontally so it acts like a mirror */
        canvas { 
            border: 2px solid #333; 
            border-radius: 8px; 
            margin-top: 20px; 
            transform: scaleX(-1); 
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <h2>Fretboard Coach - Vision Engine</h2>
    <p id="status">Loading AI Model...</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="output_canvas" width="640" height="480"></canvas>

    <script type="module" src="script.js"></script>
</body>
</html>
